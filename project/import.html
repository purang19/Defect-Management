const SUPA = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const logEl = document.getElementById('log');
function log(msg, cls){ logEl.style.display='block'; const s=document.createElement('div'); if(cls)s.className=cls; s.textContent=msg; logEl.appendChild(s); logEl.scrollTop=logEl.scrollHeight; }
let session = null;

async function refreshAuth(){
  const { data } = await SUPA.auth.getSession();
  session = data.session || null;
  const box = document.getElementById('authBox');
  if (session){
    box.innerHTML = '<div class="muted" style="font-size:13px">เข้าสู่ระบบแล้ว / Signed in as <b>'+(session.user?session.user.email:'')+'</b></div>';
  } else {
    box.innerHTML = '<label>อีเมล / Email</label><input id="em" type="email" autocomplete="username">'
      +'<label>รหัสผ่าน / Password</label><input id="pw" type="password" autocomplete="current-password">'
      +'<div class="row"><button class="primary" id="btnLogin">เข้าสู่ระบบ / Sign in</button></div>';
    document.getElementById('btnLogin').onclick = async ()=>{
      const email=document.getElementById('em').value.trim(), password=document.getElementById('pw').value;
      const { error } = await SUPA.auth.signInWithPassword({email,password});
      if (error){ log('Sign in failed: '+error.message,'err'); return; }
      await refreshAuth(); log('Signed in.','ok');
    };
  }
}
SUPA.auth.onAuthStateChange((_e,s)=>{ session=s; });

async function currentCount(){
  const { count, error } = await SUPA.from('defects').select('id',{count:'exact',head:true});
  if (error) throw error; return count||0;
}

document.getElementById('btnCheck').onclick = async ()=>{
  try { log('Current rows in defects: '+ await currentCount()); }
  catch(e){ log('Check failed: '+(e.message||e),'err'); }
};

document.getElementById('btnRun').onclick = async ()=>{
  if (!session){ log('Please sign in first.','err'); return; }
  if (!confirm('ล้างข้อมูล defects ทั้งหมดแล้วโหลด 259 รายการจาก Zite?\nThis deletes ALL current defects and replaces them with 259 records. Continue?')) return;
  try{
    const before = await currentCount();
    log('Before: '+before+' rows.');
    log('Deleting all existing defects…');
    const del = await SUPA.from('defects').delete().neq('id','___none___');
    if (del.error) throw del.error;
    log('Deleted.','ok');
    const rows = ZITE_RECORDS.map(r=>({id:r.id, data:r, created_at:r.createdAt}));
    const CH=100; let done=0;
    for (let i=0;i<rows.length;i+=CH){
      const chunk = rows.slice(i,i+CH);
      const { error } = await SUPA.from('defects').upsert(chunk,{onConflict:'id'});
      if (error) throw error;
      done += chunk.length; log('Inserted '+done+'/'+rows.length+'…');
    }
    const after = await currentCount();
    log('DONE. Final row count: '+after,'ok');
    log('Open the app and hard-refresh to see the data.','ok');
  } catch(e){ log('Import failed: '+(e.message||e),'err'); }
};
refreshAuth();
</script>
